<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exclusive Event — Luca's ID</title>
<link rel="icon" type="image/jpeg" href="logo.jpg">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --gold:#c9a84c;
  --gold2:#e8c97a;
  --gold3:#8a6820;
  --bg:#07070a;
  --bg2:#0d0d12;
  --bg3:#111118;
  --border:rgba(201,168,76,0.15);
  --border2:rgba(201,168,76,0.3);
  --text:#f0ece0;
  --text2:#9b9480;
  --text3:#5a5444;
  --red:rgba(248,113,113,1);
  --red-dim:rgba(248,113,113,0.1);
  --red-border:rgba(248,113,113,0.25);
  --green:rgba(74,222,128,1);
  --green-dim:rgba(74,222,128,0.1);
  --green-border:rgba(74,222,128,0.25);
}
html{scroll-behavior:smooth;}
body{
  font-family:'Outfit',sans-serif;
  background:url('1.jpg') no-repeat center center fixed;
  background-size:cover;
  background-color:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
  cursor:default;
  user-select:none;
  -webkit-user-select:none;
}

#loader{
  position:fixed;inset:0;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:9999;transition:opacity 1s ease,visibility 1s ease;
}
#loader.hide{opacity:0;visibility:hidden;}
.loader-ring{width:64px;height:64px;border:1px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:spin 1.2s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loader-text{font-family:'Cormorant Garamond',serif;font-size:13px;letter-spacing:0.5em;color:var(--text3);text-transform:uppercase;margin-top:24px;animation:fadePulse 1.5s ease-in-out infinite;}
@keyframes fadePulse{0%,100%{opacity:0.4}50%{opacity:1}}

.bg-grid{position:fixed;inset:0;background-image:linear-gradient(rgba(201,168,76,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(201,168,76,0.03) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;z-index:0;}
.bg-vignette{position:fixed;inset:0;background:radial-gradient(ellipse at center,rgba(7,7,10,0.4) 20%,rgba(7,7,10,0.95) 100%);pointer-events:none;z-index:0;}
.bg-glow{position:fixed;border-radius:50%;filter:blur(120px);pointer-events:none;z-index:0;}
.glow-top{width:600px;height:300px;background:rgba(201,168,76,0.04);top:-100px;left:50%;transform:translateX(-50%);}
.glow-left{width:300px;height:500px;background:rgba(201,168,76,0.03);bottom:20%;left:-100px;}
.glow-right{width:300px;height:500px;background:rgba(100,80,200,0.04);top:30%;right:-100px;}
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");opacity:0.5;pointer-events:none;z-index:1;}

.wrapper{position:relative;z-index:2;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:0 20px 80px;}

.topbar{width:100%;max-width:600px;display:flex;align-items:center;justify-content:space-between;padding:32px 0 0;opacity:0;transform:translateY(-16px);transition:all 0.8s ease 0.2s;}
.topbar.show{opacity:1;transform:translateY(0);}
.topbar-brand{font-family:'Cormorant Garamond',serif;font-size:13px;letter-spacing:0.4em;color:var(--text3);text-transform:uppercase;}
.topbar-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);opacity:0.6;animation:fadePulse 2s ease-in-out infinite;}
.topbar-status{font-size:11px;letter-spacing:0.15em;color:var(--text3);display:flex;align-items:center;gap:6px;}
.status-live{width:6px;height:6px;border-radius:50%;background:#4ade80;box-shadow:0 0 8px rgba(74,222,128,0.6);animation:fadePulse 1.5s infinite;}

.back-row{width:100%;max-width:600px;display:flex;align-items:center;gap:14px;margin-top:36px;opacity:0;transform:translateY(12px);transition:all 0.7s ease 0.35s;}
.back-row.show{opacity:1;transform:translateY(0);}
.back-btn{display:inline-flex;align-items:center;gap:8px;font-size:12px;letter-spacing:0.25em;color:var(--text3);text-transform:uppercase;text-decoration:none;padding:10px 18px;border:1px solid var(--border);border-radius:100px;background:rgba(13,13,18,0.5);backdrop-filter:blur(16px);transition:all 0.3s;}
.back-btn:hover{border-color:var(--border2);color:var(--gold);}
.back-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;}

.hero{text-align:center;padding:40px 0 28px;width:100%;max-width:600px;opacity:0;transform:translateY(24px);transition:all 1s ease 0.45s;}
.hero.show{opacity:1;transform:translateY(0);}
.hero-eyebrow{display:inline-flex;align-items:center;gap:10px;font-size:10px;letter-spacing:0.55em;text-transform:uppercase;color:var(--gold);margin-bottom:22px;padding:8px 20px;border:1px solid var(--border);border-radius:100px;background:rgba(201,168,76,0.04);}
.hero-eyebrow::before,.hero-eyebrow::after{content:'—';opacity:0.4;}
.hero-title{font-family:'Cormorant Garamond',serif;font-size:clamp(38px,9vw,68px);font-weight:300;line-height:1;letter-spacing:-0.01em;color:var(--text);margin-bottom:6px;text-shadow:0 4px 20px rgba(0,0,0,0.5);}
.hero-title em{font-style:italic;background:linear-gradient(135deg,var(--gold2),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hero-title-sub{font-family:'Cormorant Garamond',serif;font-size:clamp(12px,2.5vw,16px);font-weight:300;letter-spacing:0.35em;color:var(--text3);text-transform:uppercase;margin-bottom:16px;}
.hero-desc{font-size:14px;font-weight:300;color:var(--text2);line-height:1.7;max-width:360px;margin:0 auto;}

.ornamental-divider{display:flex;align-items:center;gap:12px;margin:32px auto;width:100%;max-width:300px;}
.div-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--border2),transparent);}
.div-gem{font-size:10px;color:var(--gold);padding:0 4px;}

.search-wrap{width:100%;max-width:600px;margin-bottom:24px;position:relative;opacity:0;transform:translateY(20px);transition:all 0.8s ease 0.6s;}
.search-wrap.show{opacity:1;transform:translateY(0);}
.search-input{width:100%;padding:16px 24px 16px 52px;background:rgba(13,13,18,0.6);border:1px solid var(--border);border-radius:18px;color:var(--text);font-family:'Outfit',sans-serif;font-size:14px;font-weight:300;outline:none;backdrop-filter:blur(16px);transition:all 0.3s;}
.search-input::placeholder{color:var(--text3);}
.search-input:focus{border-color:var(--border2);box-shadow:0 0 0 3px rgba(201,168,76,0.06),0 8px 32px rgba(0,0,0,0.4);}
.search-icon{position:absolute;left:18px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none;}
.search-icon svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:2;}

.section-label{width:100%;max-width:600px;font-size:10px;letter-spacing:0.5em;color:var(--text3);text-transform:uppercase;text-align:left;margin-bottom:16px;display:flex;align-items:center;gap:12px;}
.section-label span{white-space:nowrap;}
.section-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent);}

.events-section{width:100%;max-width:600px;opacity:0;transform:translateY(28px);transition:all 0.9s ease 0.75s;}
.events-section.show{opacity:1;transform:translateY(0);}

.event-card{
  margin-bottom:16px;border-radius:24px;overflow:hidden;
  border:1px solid var(--border);
  background:rgba(13,13,18,0.65);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  transition:border-color 0.4s,box-shadow 0.4s,transform 0.3s;
  opacity:0;transform:translateY(16px);
}
.event-card.show{opacity:1;transform:translateY(0);}
.event-card:hover{border-color:var(--border2);box-shadow:0 12px 48px rgba(0,0,0,0.6),inset 0 1px 0 rgba(201,168,76,0.08);transform:translateY(-2px);}

.event-banner{width:100%;height:180px;object-fit:cover;display:block;border-bottom:1px solid var(--border);}
.event-banner-bar{width:100%;height:3px;background:linear-gradient(90deg,var(--gold3),var(--gold2),var(--gold3));}

.event-body{padding:24px;}

.event-title-row{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:14px;}
.event-title{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:400;color:var(--text);line-height:1.2;letter-spacing:0.01em;}
.event-status-badge{flex-shrink:0;font-size:9px;letter-spacing:0.15em;text-transform:uppercase;font-weight:600;padding:5px 10px;border-radius:100px;}
.badge-live{background:var(--green-dim);border:1px solid var(--green-border);color:var(--green);}
.badge-soon{background:rgba(201,168,76,0.12);border:1px solid var(--border2);color:var(--gold);}
.badge-ended{background:var(--red-dim);border:1px solid var(--red-border);color:var(--red);}

.event-dates{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.date-chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:500;letter-spacing:0.05em;padding:5px 11px;border-radius:100px;}
.date-start{background:rgba(201,168,76,0.07);border:1px solid var(--border);color:var(--text2);}
.date-sep{font-size:11px;color:var(--text3);}
.date-end{background:var(--red-dim);border:1px solid var(--red-border);color:var(--red);}
.date-chip svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;}

.event-detail-wrap{display:grid;grid-template-rows:0fr;transition:grid-template-rows 0.45s cubic-bezier(0.4,0,0.2,1);}
.event-detail-wrap.open{grid-template-rows:1fr;}
.event-detail-inner{overflow:hidden;}
.event-detail-text{
  padding:20px 0 4px;margin-top:16px;
  border-top:1px solid var(--border);
  font-size:13px;font-weight:300;color:var(--text2);line-height:1.85;
}

.event-actions{display:flex;gap:10px;margin-top:20px;}
.btn-detail{
  flex:1;display:inline-flex;align-items:center;justify-content:center;gap:7px;
  font-size:12px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;
  padding:13px 16px;border-radius:14px;cursor:pointer;border:none;
  background:rgba(201,168,76,0.08);border:1px solid var(--border);color:var(--text2);
  transition:all 0.3s;font-family:'Outfit',sans-serif;
}
.btn-detail:hover{border-color:var(--border2);color:var(--gold);background:rgba(201,168,76,0.14);}
.btn-detail svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;transition:transform 0.3s;}
.btn-detail.open svg{transform:rotate(180deg);}

.btn-join{
  flex:1;display:inline-flex;align-items:center;justify-content:center;gap:7px;
  font-size:12px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;
  padding:13px 16px;border-radius:14px;cursor:pointer;
  background:linear-gradient(135deg,var(--gold2),var(--gold));
  color:var(--bg);text-decoration:none;border:none;
  transition:all 0.3s;font-family:'Outfit',sans-serif;
}
.btn-join:hover{box-shadow:0 6px 24px rgba(201,168,76,0.35);transform:translateY(-1px);}
.btn-join svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.5;}

.skeleton{border-radius:12px;background:linear-gradient(90deg,rgba(201,168,76,0.04) 25%,rgba(201,168,76,0.09) 50%,rgba(201,168,76,0.04) 75%);background-size:200% 100%;animation:shimmer 1.6s infinite;}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skeleton-card{margin-bottom:16px;border-radius:24px;border:1px solid var(--border);background:rgba(13,13,18,0.65);backdrop-filter:blur(16px);padding:24px;}

.empty-state{text-align:center;padding:60px 20px;color:var(--text3);}
.empty-state svg{width:40px;height:40px;stroke:currentColor;fill:none;stroke-width:1.2;margin:0 auto 16px;display:block;opacity:0.4;}
.empty-state p{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:300;letter-spacing:0.05em;}
.empty-state span{font-size:12px;letter-spacing:0.2em;opacity:0.4;display:block;margin-top:6px;}

.site-footer{width:100%;max-width:600px;margin-top:56px;text-align:center;opacity:0;transition:opacity 1s ease 1s;}
.site-footer.show{opacity:1;}
.footer-line{height:1px;background:linear-gradient(90deg,transparent,var(--border2),transparent);margin-bottom:24px;}
.footer-logo-text{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:300;color:var(--text3);letter-spacing:0.15em;margin-bottom:8px;}
.footer-links{display:flex;flex-wrap:wrap;justify-content:center;gap:16px 24px;margin:12px 0;}
.footer-links a{font-size:11px;letter-spacing:0.2em;color:var(--text3);text-decoration:none;transition:color 0.2s;}
.footer-links a:hover{color:var(--gold);}
.footer-meta{font-size:10px;letter-spacing:0.4em;color:var(--text3);opacity:0.5;}

::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}
</style>
</head>

<script>
let allEvents = [];

function getStatus(dateStartStr, dateExpStr) {
  const today = new Date();
  today.setHours(0,0,0,0);
  const parse = s => {
    if (!s) return null;
    const p = s.split(/[-/]/);
    if (p.length !== 3) return null;
    const d = new Date(p[2], p[1]-1, p[0]);
    return isNaN(d) ? null : d;
  };
  const start = parse(dateStartStr);
  const exp = parse(dateExpStr);
  if (!start && !exp) return 'soon';
  if (exp && today > exp) return 'ended';
  if (start && today < start) return 'soon';
  return 'live';
}

function badgeHTML(status) {
  const map = {
    live: ['badge-live', '● Live'],
    soon: ['badge-soon', '◇ Segera'],
    ended: ['badge-ended', '✕ Berakhir'],
  };
  const [cls, label] = map[status] || map['soon'];
  return `<span class="event-status-badge ${cls}">${label}</span>`;
}

function renderEvents(events) {
  const container = document.getElementById('eventContainer');
  const label = document.getElementById('sectionLabel');
  container.innerHTML = '';
  label.innerHTML = `<span>${events.length} Event Tersedia</span>`;

  if (!events.length) {
    container.innerHTML = `<div class="empty-state">
      <i data-lucide="alert-circle"></i>
      <p>Tidak ada event</p><span>Coba kata kunci lain</span>
    </div>`;
    lucide.createIcons();
    return;
  }

  events.forEach((evt, i) => {
    const status = getStatus(evt.dateStart, evt.dateExp);
    const bannerHTML = (evt.image && evt.image.trim())
      ? `<img src="${evt.image}" class="event-banner" alt="${evt.title}" loading="lazy">`
      : `<div class="event-banner-bar"></div>`;

    const card = document.createElement('div');
    card.className = 'event-card';
    card.style.transition = `opacity 0.5s ease ${i*0.08}s, transform 0.5s ease ${i*0.08}s, border-color 0.4s, box-shadow 0.4s`;
    card.innerHTML = `
      ${bannerHTML}
      <div class="event-body">
        <div class="event-title-row">
          <div class="event-title">${evt.title || '(Tanpa Judul)'}</div>
          ${badgeHTML(status)}
        </div>
        <div class="event-dates">
          <span class="date-chip date-start">
            <i data-lucide="calendar"></i>
            ${evt.dateStart || '—'}
          </span>
          <span class="date-sep">→</span>
          <span class="date-chip date-end">
            <i data-lucide="clock"></i>
            ${evt.dateExp || '—'}
          </span>
        </div>
        <div class="event-detail-wrap" id="detail-${i}">
          <div class="event-detail-inner">
            <div class="event-detail-text">${evt.content ? evt.content.replace(/\n/g,'<br>') : '—'}</div>
          </div>
        </div>
        <div class="event-actions">
          <button class="btn-detail" id="btnD-${i}" onclick="toggleDetail(${i})">
            <i data-lucide="chevron-down"></i>
            <span>Lihat Detail</span>
          </button>
          <a href="event-index.html" class="btn-join">
            <i data-lucide="log-in"></i>
            Join Event
          </a>
        </div>
      </div>`;
    container.appendChild(card);
    requestAnimationFrame(() => requestAnimationFrame(() => card.classList.add('show')));
  });
  lucide.createIcons();
}

function toggleDetail(i) {
  const wrap = document.getElementById(`detail-${i}`);
  const btn = document.getElementById(`btnD-${i}`);
  const isOpen = wrap.classList.toggle('open');
  btn.classList.toggle('open', isOpen);
  btn.querySelector('span').innerText = isOpen ? "Tutup Detail" : "Lihat Detail";
}

async function fetchEventsData() {
  try {
    const data = await sbFetchAll();
    if (data.events) allEvents = data.events;
    renderEvents(allEvents);
  } catch (err) {
    document.getElementById('eventContainer').innerHTML = `
      <div class="empty-state">
        <i data-lucide="wifi-off"></i>
        <p>Gagal memuat event</p><span>Periksa koneksi internet Anda</span>
      </div>`;
    lucide.createIcons();
  }
}

document.addEventListener('DOMContentLoaded', () => {
  lucide.createIcons();
  document.getElementById('searchInput').addEventListener('input', e => {
    const q = e.target.value.toLowerCase().trim();
    renderEvents(q ? allEvents.filter(ev =>
      ev.title?.toLowerCase().includes(q) ||
      ev.content?.toLowerCase().includes(q)
    ) : allEvents);
  });
});

window.addEventListener('load', () => {
  const seq = [
    ['topbar',        100],
    ['backRow',       200],
    ['hero',          350],
    ['searchWrap',    550],
    ['eventsSection', 700],
    ['siteFooter',   1100],
  ];
  setTimeout(() => {
    document.getElementById('loader').classList.add('hide');
    seq.forEach(([id, delay]) => {
      setTimeout(() => document.getElementById(id).classList.add('show'), delay);
    });
    setTimeout(fetchEventsData, 800);
  }, 1000);
});

document.addEventListener('contextmenu', e => e.preventDefault());
