<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luca's ID</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/10757/10757289.png">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.15);
            --blur: 25px;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #0a0a0a;
            margin: 0;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            overflow: hidden;
            -webkit-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        body.loaded {
            background: url('1.jpg') no-repeat center center fixed;
            background-size: cover;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(var(--blur));
            -webkit-backdrop-filter: blur(var(--blur));
            border: 1px solid var(--glass-border);
            border-radius: 35px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
            padding: 2.5rem;
            opacity: 0;
            transform: translateY(30px) scale(0.95);
            transition: all 1s cubic-bezier(0.22, 1, 0.36, 1);
        }

        body.loaded .glass-card {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .input-group {
            margin-bottom: 1.5rem;
            transform: translateY(20px);
            opacity: 0;
            transition: all 0.6s cubic-bezier(0.22, 1, 0.36, 1);
        }

        body.loaded .input-group {
            opacity: 1;
            transform: translateY(0);
        }

        .input-group:nth-child(1) { transition-delay: 0.2s; }
        .input-group:nth-child(2) { transition-delay: 0.3s; }

        .input-field {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 18px;
            padding: 14px 18px;
            color: white;
            outline: none;
            transition: all 0.4s ease;
        }

        .input-field:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(0,0,0,0.3);
        }

        .login-btn {
            width: 100%;
            background: white;
            color: black;
            font-weight: 800;
            padding: 16px;
            border-radius: 18px;
            margin-top: 1rem;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            border: none;
            letter-spacing: 0.05em;
            opacity: 0;
            transform: translateY(20px);
        }

        body.loaded .login-btn {
            opacity: 1;
            transform: translateY(0);
            transition-delay: 0.4s;
        }

        .login-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 30px rgba(255,255,255,0.2);
        }

        #notification {
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 15px 25px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 1000;
            transition: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            pointer-events: none;
        }

        #notification.show { top: 30px; }

        .shake { animation: shakeAnim 0.4s cubic-bezier(.36,.07,.19,.97) both; }

        @keyframes shakeAnim {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        .pulse-icon { animation: pulseIcon 2s infinite; }
        @keyframes pulseIcon {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.1); filter: brightness(1.3); }
        }
    </style>
</head>
<body class="loaded">

    <div id="notification">
        <img src="https://cdn-icons-png.flaticon.com/512/4325/4325930.png" class="w-7 h-7" alt="Icon">
        <span id="notif-text" class="font-bold text-sm"></span>
    </div>

    <div class="glass-card">
        <div class="text-center mb-10">
            <img src="https://cdn-icons-png.flaticon.com/512/12724/12724606.png" alt="Operator" class="w-20 h-20 mx-auto mb-4 pulse-icon">
            <h2 class="text-3xl font-extrabold tracking-tight">Operator Login</h2>
            <p class="text-white/40 text-[10px] uppercase tracking-[0.4em] mt-2">Luca's Management System</p>
        </div>

        <form id="loginForm">
            <div class="input-group">
                <label class="block text-[10px] font-bold text-white/50 uppercase tracking-widest mb-2 ml-2">Email Access</label>
                <input type="email" id="email" class="input-field" placeholder="name@example.com" required autocomplete="off">
            </div>

            <div class="input-group">
                <label class="block text-[10px] font-bold text-white/50 uppercase tracking-widest mb-2 ml-2">Password</label>
                <input type="password" id="password" class="input-field" placeholder="••••••••" required>
            </div>

            <button type="submit" class="login-btn">LOGIN</button>
        </form>

        <a href="index.html" class="block text-center mt-8 text-xs text-white/30 hover:text-white transition-colors duration-300">
            ← Kembali ke beranda
        </a>
    </div>

                sessionStorage.setItem('isLoggedIn', 'true');

                setTimeout(() => {

                    card.style.transform = "scale(0.9) translateY(-20px)";

</body>
</html>
